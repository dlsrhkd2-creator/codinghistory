<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox 기초</title>
  <style>
   /* 가로 방향 */
   /* .navbar {
    display: flex;
    background: #333;
    padding: 1rem;
   } */

   /* 세로 방향 */
   .navbar {
    display: flex;
    flex-direction: column; /* 세로 방향으로 변경 */
    background-color: #333;
    padding: 1rem;
    width: 200px; /* 세로 메뉴의 폭을 제한 */
    gap: 10px;
   }


   .nav-item {
    color: white;
    text-decoration: none;
    padding: 0.5rem 1rem;
    margin: 0 0.5rem;
    background-color: #555;
    border-radius: 5px;
   }

   .nav-item:last-child {
    margin-bottom: 0;
   }

   .nav-item:hover {
    background-color: #777;
   }

   .full-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 1rem 2rem;
    color: white;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  color: #4caf50;
}

.nav-menu {
  display: flex;
  gap: 1rem;
}

.nav-item {
  color: white;
  text-decoration: none;
  padding: 0.5rem 1rem;
  border-radius: 4px;
  transition: background-color 0.3s;
}

.nav-item:hover {
  background-color: #555;
}

.login-btn {
  background-color: #4caf50;
  color: white;
  padding: 0.5rem 1rem;
  text-decoration: none;
  border-radius: 4px;
  border: 2px solid #4caf50;
  transition: all 0.3s;
}

.login-btn:hover {
  background-color: transparent;
  border: 2px solid #4caf50;
  border-radius: 5px;
}


  </style>
</head>
<body>
  <nav class="navbar">
   <a href="#" class="nav-item">홈</a>
   <a href="#" class="nav-item">소개</a>
   <a href="#" class="nav-item">서비스</a>
   <a href="#" class="nav-item">연락처</a>
  </nav>
  <!-- 응용하여 완전한 네비게이션 바 만들기 -->
<nav class="full-navbar">
  <div class="logo">MyWebsite</div>
  <div class="nav-menu">
  <a href="#" class="nav-item">홈</a>
  <a href="#" class="nav-item">소개</a>
  <a href="#" class="nav-item">서비스</a>
  <a href="#" class="nav-item">연락처</a>
  </div class="auth-buttons">
  <a href="#" class="login-btn">로그인</a>
  </div>
</nav>

</body>
</html>
